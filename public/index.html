<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to new website...</title>
    
    <!-- Auto redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=https://valtermedeiros.com">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .timer {
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting...</h1>
        <p>You will be redirected to the new website in 5 seconds.</p>
        <div class="timer">Please wait...</div>
        <div>Taking you to <b>valtermedeiros.com</b></div>
    </div>

    <!-- JavaScript fallback (in case meta refresh is blocked) -->
    <script>
        setTimeout(function() {
            window.location.href = "https://valtermedeiros.com";
        }, 5000);
    </script>
</body>
</html>
